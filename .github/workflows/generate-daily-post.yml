name: Generate Daily AI News Post

on:
  schedule:
    # 00:00 UTC = 09:00 JST
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Generate news post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_DIR: ${{ github.workspace }}
        run: timeout 480 node scripts/generate-post.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add daily AI news post for $(TZ=Asia/Tokyo date +%Y.%m.%d)"
            timeout 120 git push || { echo "git push timed out or failed"; exit 1; }
          fi
